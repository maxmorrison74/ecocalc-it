name: Daily Municipal Jobs Scraper

on:
  schedule:
    - cron: '0 4 * * *'  # Runs daily at 04:00 AM UTC
  workflow_dispatch:     # Allows manual trigger from GitHub UI

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Run Job Scraper
        run: |
          python3 scripts/scrape_jobs.py

      - name: Commit and Push Updated Database
        run: |
          git config --global user.name 'EcoCalc Bot'
          git config --global user.email 'bot@ecocalc.it'
          git add jobs.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update municipal concorsi & job listings database" && git push)
